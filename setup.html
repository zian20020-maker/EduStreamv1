<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Your Account | EduStream</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="setup-body">
    
    <div class="">
            <nav class="setnavbar">

        <div class="logo"><a href="index.html#home"><img class="eduicon" src="img/3dicon.png"><h3 class="logo-text" data-i18n="edutitle">EduStream</h3></a> </div>

        <ul class="nav-links">

            <li><a href="index.html#home" data-i18n="nav_home">Home</a></li>
            <li><button id="openLogin" class="btn-primary" data-i18n="nav_get_started">Get Started</button></li>
            <div class="lang-control">
                <select id="langSwitcher">
                    <option value="en">English</option>
                    <option value="ar">العربية</option>
                </select>
            </div>
        </ul>

    </nav>

    </div>
            <div class="setup-logo-circle">
                <img src="img/3dicon.png" alt="Logo" class="setup-logo-img">
            </div>
    <div class="setup-container glass">
        <div class="setup-header">
            <h1 data-i18n="create_profile">Create Your Profile</h1>
            <p data-i18n="welcomepr">Welcome to EduStream! Let's get your account ready.</p>
        </div>
<form id="setupForm" class="setup-form">
    <div class="input-row">
        <div class="input-group">
            <label data-i18n="fullname" for="fullName">Full Name</label>
            <input type="text" id="fullName" placeholder="e.g. John Doe" required>
        </div>
        <div class="input-group">
            <label data-i18n="username" for="username">Username</label>
            <input type="text" id="username" placeholder="@johndoe" required>
        </div>
    </div>

    <div class="input-group">
        <label data-i18n="email" for="email">Email Address</label>
        <input type="email" id="email" placeholder="name@email.com" required>
    </div>

    <div class="input-row">
        <div class="input-group">
            <label data-i18n="password" for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
            <div class="strength-container">
                <div id="strengthBar"></div>
            </div>
        </div>
        <div class="input-group">
            <label data-i18n="confirmpassword" for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="••••••••" required>
        </div>
    </div>

    <div class="setup-info-box">
        <p data-i18n="notecont"="">💡 <span data-i18n="note">Note:</span> You can customize your profile picture and bio once your account is launched.</p>
    </div>

    <button type="submit" class="btn-primary launch-btn" data-i18n="launch_account">Launch My Account</button>
</form>
    </div>

<div id="loginModal" class="modal-overlay">

    <div class="modal-content glass">

        <span class="close-btn">&times;</span>

        <div class="profile-header">

            <div class="profile-avatar">

                <img src="https://ui-avatars.com/api/?name=User&background=2563eb&color=fff" alt="Profile">

            </div>

            <h2>Welcome Back</h2>

            <p>Login to your student account</p>

        </div>

       

        <form id="loginForm">

            <div class="input-group">

                <label>Email Address</label>

                <input type="email" placeholder="name@company.com" required>

            </div>

            <div class="input-group">

                <label>Password</label>

                <input type="password" placeholder="••••••••" required>

            </div>

            <button type="submit" class="btn-primary full-width">Sign In</button>

            <div class="modal-footer">

                <a href="#">Forgot password?</a>

                <span>Don't have an account? <a href="#join">Join Now</a></span>

            </div>

        </form>

    </div>

</div>
    <script src="setup.js"></script>
</body>
</html>
